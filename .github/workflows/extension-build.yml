name: extension-build

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: extension-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - name: cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: install deps
        run: bun install
      - name: build
        run: bun run build
      - name: archive dist
        run: |
          cd dist
          zip -r ../extension-dist.zip .
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: extension-dist.zip
